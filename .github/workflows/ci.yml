name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (type-check + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm test

  rust-core:
    name: Rust audio-core (fmt + clippy + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      # audio-core has no GUI deps, so no webkit/gtk needed here.
      - run: cargo fmt -p audio-core -- --check
      - run: cargo clippy -p audio-core -- -D warnings
      - run: cargo test -p audio-core

  tauri-lint:
    name: Tauri app crate (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf build-essential libssl-dev
      - run: npm ci
      # tauri's generate_context! reads the built frontend (frontendDist = ../dist).
      - run: npm run build
      - run: cargo fmt -p track-exploder -- --check
      - run: cargo clippy -p track-exploder -- -D warnings
      - run: cargo clippy -p track-exploder --features mp3 -- -D warnings

  tauri-build:
    name: Tauri build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf build-essential libssl-dev
      - run: npm ci
      - run: npm run tauri build -- --ci

  android:
    name: Android debug APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Install NDK
        run: |
          sdkmanager "ndk;27.2.12479018"
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> "$GITHUB_ENV"
      - run: npm ci
      - name: Init & build Android debug APK (arm64)
        run: |
          npm run tauri android init
          # Overwrite the scaffold's default launcher icon with our app icons.
          dest=src-tauri/gen/android/app/src/main/res
          cp -rf src-tauri/icons/android/mipmap-* "$dest/"
          cp -f src-tauri/icons/android/values/ic_launcher_background.xml "$dest/values/"
          npm run tauri android build -- --debug --apk --target aarch64
      - uses: actions/upload-artifact@v4
        with:
          name: track-exploder-debug-apk
          path: src-tauri/gen/android/app/build/outputs/apk/**/*debug*.apk
          if-no-files-found: error
