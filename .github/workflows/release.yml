name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build & release (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            label: macOS (Apple Silicon)
            args: "--target aarch64-apple-darwin --features mp3"
          - platform: macos-latest
            label: macOS (Intel)
            args: "--target x86_64-apple-darwin --features mp3"
          - platform: ubuntu-latest
            label: Linux
            args: "--features mp3"
          - platform: windows-latest
            label: Windows
            args: "--features mp3"
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf build-essential libssl-dev
      - run: npm ci
      # Builds installers and attaches them to a draft GitHub release for the tag.
      # MP3 export is enabled (--features mp3 → pure-Rust shine-rs, LGPL).
      # macOS/Windows installers are unsigned (users may see OS prompts, documented
      # in README); the Linux RPM is GPG-signed in the step below.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Track Exploder ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          releaseBody: |
            Extract and remix barbershop part-left learning tracks — isolate each voice, build any mix, change tempo without changing pitch, and export. MP3 export is enabled in these builds.

            ## Which download do I need?

            | Your system | File to download |
            | --- | --- |
            | **Windows** | the `_x64-setup.exe` (or `.msi`) — unsigned; SmartScreen → **More info → Run anyway** |
            | **macOS — Apple Silicon** (M1–M4) | the `_aarch64.dmg` — unsigned; **right-click → Open** the first time |
            | **macOS — Intel** | the `_x64.dmg` — unsigned; **right-click → Open** the first time |
            | **Linux — openSUSE / Fedora / RHEL** | the `.rpm` — GPG-signed (import `track-exploder-signing-key.asc` first) |
            | **Linux — Debian / Ubuntu** | the `_amd64.deb` |
            | **Linux — portable** | the `_amd64.AppImage` (`chmod +x`, then run) |
            | **Android** (arm64) | the `_android-arm64.apk` (debug-signed) |

            The `*.app.tar.gz` files are auto-update artifacts — ignore them for a normal install.

            ## Verify the RPM (openSUSE / Fedora)

            ```bash
            sudo rpm --import track-exploder-signing-key.asc
            sudo zypper install ./Track.Exploder-*.rpm    # or: sudo dnf install on Fedora
            ```

            Signing key fingerprint: `3A1F 4A9A 5EF1 A7F1`. macOS/Windows builds are unsigned (no code-signing certs yet); the steps above clear the OS prompts.

      # GPG-sign the RPM and replace the unsigned one on the release, plus attach
      # the public key so users can `rpm --import` it and verify.
      - name: Sign the Linux RPM
        if: matrix.platform == 'ubuntu-latest'
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GPG_KEY_ID: 3A1F4A9A5EF1A7F1
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          sudo apt-get install -y rpm
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          printf '%s' "$GPG_PASSPHRASE" > /tmp/te-gpg-pass
          cat > "$HOME/.rpmmacros" <<EOF
          %_signature gpg
          %_gpg_name $GPG_KEY_ID
          %__gpg_sign_cmd %{__gpg} gpg --batch --no-verbose --no-armor --pinentry-mode loopback --passphrase-file /tmp/te-gpg-pass --no-secmem-warning -u "%{_gpg_name}" -sbo %{__signature_filename} %{__plaintext_filename}
          EOF
          # Cargo workspace is rooted at the repo, so bundles land in ./target.
          src=$(find target src-tauri/target -name '*.rpm' -print -quit 2>/dev/null || true)
          if [ -z "$src" ]; then echo "No RPM found" >&2; find . -name '*.rpm' 2>/dev/null; exit 1; fi
          # The product name has a space ("Track Exploder"), which rpm's signer
          # can't handle in a path. Sign a space-free copy named exactly like the
          # asset tauri-action uploaded (spaces -> dots) so --clobber replaces it.
          asset="$(basename "$src" | tr ' ' '.')"
          cp "$src" "$asset"
          echo "Signing $asset"
          # rpm --addsign fails (non-zero) if gpg signing errors, so this is the
          # real guard that a signature was written.
          rpm --addsign "$asset"
          gpg --export --armor "$GPG_KEY_ID" > track-exploder-signing-key.asc
          sudo rpm --import track-exploder-signing-key.asc
          # Informational only: the Ubuntu runner's rpm can't verify EdDSA
          # signatures (openSUSE/Fedora, which use the libgcrypt backend, can),
          # so a "NOT OK" here is a runner limitation, not a bad signature.
          rpm --checksig "$asset" || echo "note: runner rpm can't self-verify EdDSA; signature was still added"
          shred -u /tmp/te-gpg-pass 2>/dev/null || rm -f /tmp/te-gpg-pass
          gh release upload "${GITHUB_REF_NAME}" "$asset" track-exploder-signing-key.asc --clobber

  android:
    name: Android APK (arm64)
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Install NDK
        run: |
          sdkmanager "ndk;27.2.12479018"
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> "$GITHUB_ENV"
      - run: npm ci
      # Debug-signed so it installs without a keystore, and the signing key is
      # stable across releases so users can upgrade over a previous install.
      - name: Build Android APK (arm64, with MP3)
        run: |
          npm run tauri android init
          # `android init` scaffolds Tauri's default launcher icon; overwrite the
          # generated res with our committed app icons so the APK uses our logo.
          dest=src-tauri/gen/android/app/src/main/res
          cp -rf src-tauri/icons/android/mipmap-* "$dest/"
          cp -f src-tauri/icons/android/values/ic_launcher_background.xml "$dest/values/"
          npm run tauri android build -- --debug --apk --target aarch64 --features mp3
      - name: Attach APK to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          apk=$(find src-tauri/gen/android/app/build/outputs/apk -name '*debug*.apk' | head -1)
          if [ -z "$apk" ]; then echo "No APK found" >&2; exit 1; fi
          dest="Track-Exploder_${GITHUB_REF_NAME}_android-arm64.apk"
          cp "$apk" "$dest"
          gh release upload "$GITHUB_REF_NAME" "$dest" --clobber
